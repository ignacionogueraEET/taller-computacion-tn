name: Generar lista de actividades

on:
  push:
    paths:
      - 'consignas/**'
  workflow_dispatch:

jobs:
  generar-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
      
      - name: Instalar jq
        run: sudo apt-get update && sudo apt-get install -y jq
      
      - name: Generar actividades.json con jq
        run: |
          # Crear un array JSON vacío
          echo "[]" > actividades.json
          
          # Para cada carpeta de actividad, agregarla al JSON usando jq
          for dir in consignas/actividad-*/; do
            if [ -d "$dir" ]; then
              nombre=$(basename "$dir")
              # Extraer el número (quitar "actividad-" y los ceros a la izquierda)
              num=$(echo "$nombre" | sed 's/actividad-0*//' | sed 's/^$/0/')
              
              # Agregar al JSON usando jq (escapa correctamente caracteres especiales)
              jq --arg id "$num" --arg nombre "$nombre" --arg ruta "consignas/$nombre/" \
                '. += [{"id": ($id | tonumber), "nombre": $nombre, "ruta": $ruta}]' \
                actividades.json > temp.json && mv temp.json actividades.json
            fi
          done
          
          echo "Contenido generado:"
          cat actividades.json
      
      - name: Commitear y pushear actividades.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add actividades.json
          git diff --staged --quiet || git commit -m "Actualiza lista de actividades [automático]"
          git push