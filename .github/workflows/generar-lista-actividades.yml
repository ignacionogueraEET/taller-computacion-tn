name: Generar lista de actividades

on:
  push:
    paths:
      - 'consignas/**'

jobs:
  generar-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
      
      - name: Generar actividades.json
        run: |
          echo "[" > actividades.json
          first=true
          for dir in consignas/actividad-*/; do
            if [ -d "$dir" ]; then
              num=$(basename "$dir" | sed 's/actividad-0*//')
              nombre=$(basename "$dir")
              
              if [ "$first" = true ]; then
                first=false
              else
                echo "," >> actividades.json
              fi
              
              echo "  {\"id\": $num, \"nombre\": \"$nombre\", \"ruta\": \"consignas/$nombre/\"}" >> actividades.json
            fi
          done
          echo "]" >> actividades.json
      
      - name: Commitear y pushear actividades.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add actividades.json
          git diff --staged --quiet || git commit -m "Actualiza lista de actividades [automático]"
          git push