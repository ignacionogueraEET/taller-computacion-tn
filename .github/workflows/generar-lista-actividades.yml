name: Generar lista de actividades

on:
  push:
    paths:
      - 'consignas/**'
  workflow_dispatch:

jobs:
  generar-json:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4
      
      - name: Instalar jq
        run: sudo apt-get update && sudo apt-get install -y jq
      
      - name: Generar actividades.json válido
        run: |
          # Inicializar array vacío
          echo "[]" > actividades.json
          
          contador=1
          
          for dir in consignas/actividad-*/; do
            if [ -d "$dir" ]; then
              nombre=$(basename "$dir")
              
              # Usar jq para agregar elemento correctamente (sin comas extra)
              jq --argjson id "$contador" \
                 --arg nombre "$nombre" \
                 --arg ruta "consignas/$nombre/" \
                 '. + [{"id": $id, "nombre": $nombre, "ruta": $ruta}]' \
                 actividades.json > temp.json && mv temp.json actividades.json
              
              contador=$((contador + 1))
            fi
          done
          
          echo "=== Contenido generado ==="
          cat actividades.json
          echo ""
          echo "=== Validación JSON ==="
          jq '.' actividades.json > /dev/null && echo "JSON VÁLIDO ✅" || echo "JSON INVÁLIDO ❌"
      
      - name: Commitear y pushear actividades.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add actividades.json
          git diff --staged --quiet || git commit -m "Actualiza lista de actividades [automático]"
          git push